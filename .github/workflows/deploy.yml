name: Deploy

on:
  push:
    branches:
      - develop
      - main
      - "release/**"
      - "hotfix/**"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Resolve the target environment based on the branch name
  # develop        → staging
  # release/**     → uat
  # main, hotfix/** → production
  # ─────────────────────────────────────────────────────────────
  resolve-env:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.env-map.outputs.env_name }}
      is_production: ${{ steps.env-map.outputs.is_production }}
    steps:
      - id: env-map
        run: |
          case "${GITHUB_REF_NAME}" in
            develop)
              echo "env_name=staging"    >> $GITHUB_OUTPUT
              echo "is_production=false" >> $GITHUB_OUTPUT
              ;;
            release/*)
              echo "env_name=uat"        >> $GITHUB_OUTPUT
              echo "is_production=false" >> $GITHUB_OUTPUT
              ;;
            main|hotfix/*)
              echo "env_name=production" >> $GITHUB_OUTPUT
              echo "is_production=true"  >> $GITHUB_OUTPUT
              ;;
            *)
              echo "env_name=none"       >> $GITHUB_OUTPUT
              echo "is_production=false" >> $GITHUB_OUTPUT
              ;;
          esac

  # ─────────────────────────────────────────────────────────────
  # Deploy Frontend to Vercel
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (${{ needs.resolve-env.outputs.env_name }})
    needs: resolve-env
    if: needs.resolve-env.outputs.env_name != 'none'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve-env.outputs.env_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
          working-directory: ./frontend
          # Only pass --prod for production and UAT environments
          vercel-args: ${{ needs.resolve-env.outputs.is_production == 'true' && '--prod' || '' }}

  # ─────────────────────────────────────────────────────────────
  # Deploy Backend to Vercel + run Aiven DB migrations
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (${{ needs.resolve-env.outputs.env_name }})
    needs: resolve-env
    if: needs.resolve-env.outputs.env_name != 'none'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve-env.outputs.env_name }}

    steps:
      - uses: actions/checkout@v4

      # Database migrations are not automated yet — the project uses raw SQL
      # schema (mysql/init/01_schema.sql) without a migration tool like Knex.
      # Schema changes to Aiven must be applied manually for now.
      # TODO: Add Knex or another migration tool when the project needs it.

      - name: Deploy Backend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          working-directory: ./backend
          vercel-args: ${{ needs.resolve-env.outputs.is_production == 'true' && '--prod' || '' }}

  # ─────────────────────────────────────────────────────────────
