name: Deploy

# ── Triggers ───────────────────────────────────────────────────────────────
# Only fires on pushes to integration branches — never on feature/* because
# feature branches are personal work and should not be deployed anywhere.

on:
  push:
    branches:
      - develop          # → staging
      - "release/**"     # → UAT / pre-production
      - main             # → production
      - "hotfix/**"      # → production (fast-track)

# One deploy per environment at a time.
# If a new push lands while a deploy is running, the in-progress one is
# cancelled so the latest code always wins.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# ── Resolve environment from branch name ───────────────────────────────────
# A reusable job that sets three outputs:
#   env_name  → 'staging' | 'uat' | 'production'
#   api_url   → the secret name for NEXT_PUBLIC_API_URL
#   host      → the secret name for STAGING/UAT/PROD_HOST
# This keeps the deploy jobs DRY — they all read from the same output.

jobs:

  # ════════════════════════════════════════════════════════════════
  # RESOLVE — figure out which environment this push targets
  # ════════════════════════════════════════════════════════════════
  resolve-env:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set.outputs.env_name }}

    steps:
      - name: Set environment name from branch
        id: set
        run: |
          BRANCH="${{ github.ref_name }}"

          if [[ "$BRANCH" == "develop" ]]; then
            echo "env_name=staging" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == release/* ]]; then
            echo "env_name=uat" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "main" || "$BRANCH" == hotfix/* ]]; then
            echo "env_name=production" >> $GITHUB_OUTPUT

          else
            echo "env_name=none" >> $GITHUB_OUTPUT
          fi

  # ════════════════════════════════════════════════════════════════
  # DEPLOY FRONTEND
  # ════════════════════════════════════════════════════════════════
  deploy-frontend:
    name: Deploy frontend → ${{ needs.resolve-env.outputs.env_name }}
    runs-on: ubuntu-latest
    needs: resolve-env
    if: needs.resolve-env.outputs.env_name != 'none'

    # GitHub Environments gate production deploys behind a manual approval.
    # Configure approvers at: Settings → Environments → production
    environment: ${{ needs.resolve-env.outputs.env_name }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Build with the API URL for the resolved environment.
      # Each GitHub Environment stores its own set of secrets,
      # so NEXT_PUBLIC_API_URL resolves to the right value automatically.
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            APP_DIR=/var/www/student-housing/${{ needs.resolve-env.outputs.env_name }}/frontend

            cd $APP_DIR
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            npm ci --omit=dev
            npm run build

            # Zero-downtime reload with pm2
            pm2 reload frontend-${{ needs.resolve-env.outputs.env_name }} --update-env \
              || pm2 start npm \
                   --name "frontend-${{ needs.resolve-env.outputs.env_name }}" \
                   -- start

  # ════════════════════════════════════════════════════════════════
  # DEPLOY BACKEND
  # ════════════════════════════════════════════════════════════════
  deploy-backend:
    name: Deploy backend → ${{ needs.resolve-env.outputs.env_name }}
    runs-on: ubuntu-latest
    needs: resolve-env
    if: needs.resolve-env.outputs.env_name != 'none'

    environment: ${{ needs.resolve-env.outputs.env_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            APP_DIR=/var/www/student-housing/${{ needs.resolve-env.outputs.env_name }}/backend

            cd $APP_DIR
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            npm ci --omit=dev

            # Run only new migrations — safe to re-run, skips already-applied ones
            npm run migrate:latest

            # Zero-downtime reload with pm2
            pm2 reload backend-${{ needs.resolve-env.outputs.env_name }} --update-env \
              || pm2 start npm \
                   --name "backend-${{ needs.resolve-env.outputs.env_name }}" \
                   -- start

  # # ════════════════════════════════════════════════════════════════
  # # NOTIFY — Slack message after deploy (success or failure)
  # # ════════════════════════════════════════════════════════════════
