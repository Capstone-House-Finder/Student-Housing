name: Backend CI

on:
  push:
    branches:
      - develop
      - main
      - "release/**"
      - "hotfix/**"
      - "feature/**"
      - "bugfix/**"
    paths:
      - "backend/**"
      - "mysql/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - develop
      - main
      - "release/**"
      - "hotfix/**"
      - "feature/**"
      - "bugfix/**"
    paths:
      - "backend/**"
      - "mysql/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run TypeScript type-check
        run: npm run type-check

  test:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: student_housing_test
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Grant CREATE USER privilege
        run: |
          mysql -h 127.0.0.1 -u root -prootpassword student_housing_test \
            -e "GRANT CREATE USER ON *.* TO 'appuser'@'%' IDENTIFIED BY 'apppassword'; FLUSH PRIVILEGES;"
      - name: Apply schema
        run: |
          mysql -h 127.0.0.1 -u appuser -papppassword student_housing_test \
            < ../mysql/init/01_schema.sql
      - name: Run Jest with coverage
        run: npm run test -- --ci --coverage
      - name: Upload coverage artifact
        if: ${{ github.ref_name == 'develop' || github.ref_name == 'main' || startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'hotfix/') }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

  build:
    name: TypeScript build
    needs: [lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Compile TypeScript
        run: npm run build
      - name: Upload build artifact
        if: ${{ github.ref_name == 'develop' || github.ref_name == 'main' || startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'hotfix/') }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-${{ github.sha }}
          path: dist/
          retention-days: 1