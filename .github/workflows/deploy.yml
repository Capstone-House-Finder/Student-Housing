  #   steps:
  #     - name: Send result to Slack
  #       uses: slackapi/slack-github-action@v1.26.0
  #       with:
  #         payload: |
  #           {
  #             "text": "${{ (needs.deploy-frontend.result == 'success' && needs.deploy-backend.result == 'success') && '✅ Deploy succeeded' || '❌ Deploy failed' }} — *${{ github.ref_name }}* → *${{ needs.resolve-env.outputs.env_name }}* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
  #           }
