name: Frontend CI

# ── Triggers ───────────────────────────────────────────────────────────────
# Runs on every Gitflow branch but ONLY when frontend-related files change.
# This keeps the pipeline fast — a backend-only commit never triggers
# a Next.js build.

on:
  push:
    branches:
      - develop
      - main
      - "feature/**"
      - "release/**"
      - "hotfix/**"
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

  pull_request:
    branches:
      - develop
      - main
      - "release/**"
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

# Cancel in-progress runs on the same branch when a new commit is pushed.
# Prevents a slow feature branch run from blocking a newer one.
concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ════════════════════════════════════════════════════════════════
  # LINT & TYPE-CHECK
  # Runs first and fast. If this fails there is no point building.
  # ════════════════════════════════════════════════════════════════
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type-check
        run: npm run type-check

  # ════════════════════════════════════════════════════════════════
  # UNIT TESTS
  # Runs in parallel with lint — independent concern.
  # ════════════════════════════════════════════════════════════════
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm run test -- --ci --passWithNoTests --coverage
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000

      # Upload coverage only on integration branches where it matters.
      # Skip on feature/* to avoid polluting artefact storage.
      - name: Upload coverage report
        if: |
          github.ref == 'refs/heads/develop' ||
          github.ref == 'refs/heads/main'    ||
          startsWith(github.ref, 'refs/heads/release/')
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-${{ github.run_id }}
          path: frontend/coverage/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  # BUILD
  # Runs after lint AND tests both pass.
  # Validates the production bundle compiles cleanly.
  # ════════════════════════════════════════════════════════════════
  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          # Placeholder so the build does not fail on missing env vars.
          # The real value is injected by the deploy workflow at deploy time.
          NEXT_PUBLIC_API_URL: http://localhost:5000
          NEXT_TELEMETRY_DISABLED: 1

      # Cache the build output on integration branches so the deploy
      # workflow can reuse it instead of rebuilding from scratch.
      - name: Cache build output
        if: |
          github.ref == 'refs/heads/develop' ||
          github.ref == 'refs/heads/main'    ||
          startsWith(github.ref, 'refs/heads/release/') ||
          startsWith(github.ref, 'refs/heads/hotfix/')
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: |
            frontend/.next/
            frontend/public/
          retention-days: 1
